name: Publish to PyPI

# Builds and publishes carterkit to PyPI on a version tag (vX.Y.Z) using PyPI
# Trusted Publishing (OIDC) — no API token stored anywhere.
#
# One-time setup at https://pypi.org/manage/account/publishing/ (pending publisher):
#   PyPI project name: carterkit
#   Owner:             Mariner10
#   Repository:        carterkit
#   Workflow name:     publish.yml
#   Environment:       (leave blank)
#
# Release:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
